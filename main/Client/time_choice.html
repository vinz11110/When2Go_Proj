<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

            <button class="back" onclick="window.history.back()">Back</button>
        </div>

            <button class="login" onclick="window.location.href='login.html'">Sign up / Log in</button>
        </div>
    </nav>
    <main>
        <div class="title">
            <h3>Find the best time for your vacation</h3>
        </div>
        <section class="define">
            <ul class="catMonths">
                <li><button >Spring</button></li>
                <li><button >Summer</button></li>

                    <div>
                        <label for="search">Vacation days</label>
                        <input type="number" id="search">
                    </div>
                    <button type="button" onclick="vacationTimeRecom()">Search</button>

            </div>

        <section class="contentContainer" id="calenders">
